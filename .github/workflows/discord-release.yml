name: Discord Release Announcement

on:
  release:
    types: [published]

jobs:
  announce:
    runs-on: ubuntu-latest

    steps:
      - name: Send release embed to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          REPO_NAME: ${{ github.event.repository.name }}
          RELEASE_PUBLISHED_AT: ${{ github.event.release.published_at }}
        run: |
          python <<'PY'
          import json
          import os
          import urllib.request

          webhook_url = os.environ["DISCORD_WEBHOOK_URL"]
          release_name = os.environ["RELEASE_NAME"]
          release_tag = os.environ["RELEASE_TAG"]
          release_body = os.environ.get("RELEASE_BODY", "").strip()
          release_url = os.environ["RELEASE_URL"]
          repo_name = os.environ["REPO_NAME"]
          published_at = os.environ["RELEASE_PUBLISHED_AT"]

          safe_changelog = release_body if release_body else "No changelog provided."
          safe_changelog = safe_changelog[:1000]

          payload = {
              "username": "Xy Updates",
              "avatar_url": "https://i.imgur.com/oMMV6cO.png",
              "embeds": [
                  {
                      "title": release_name,
                      "url": release_url,
                      "description": f"A new plugin update has been released for **{repo_name}**.",
                      "color": 16753920,
                      "thumbnail": {
                          "url": "https://i.imgur.com/oMMV6cO.png"
                      },
                      "fields": [
                          {
                              "name": "Plugin",
                              "value": f"**{repo_name}**",
                              "inline": True
                          },
                          {
                              "name": "Version",
                              "value": f"**{release_tag}**",
                              "inline": True
                          },
                          {
                              "name": "Changelog",
                              "value": safe_changelog,
                              "inline": False
                          }
                      ],
                      "footer": {
                          "text": "Xy Development • Minecraft Plugin Updates"
                      },
                      "timestamp": published_at
                  }
              ]
          }

          data = json.dumps(payload).encode("utf-8")
          req = urllib.request.Request(
              webhook_url,
              data=data,
              headers={"Content-Type": "application/json"},
              method="POST"
          )

          print("Payload preview:")
          print(json.dumps(payload, indent=2))

          try:
              with urllib.request.urlopen(req) as response:
                  print("HTTP status:", response.status)
                  body = response.read().decode("utf-8", errors="ignore")
                  print("Response body:", body if body else "<empty>")
          except urllib.error.HTTPError as e:
              print("HTTP status:", e.code)
              error_body = e.read().decode("utf-8", errors="ignore")
              print("Response body:", error_body if error_body else "<empty>")
              raise
          PY