name: Discord Release Announcement

on:
  release:
    types: [published]

jobs:
  announce:
    runs-on: ubuntu-latest

    steps:
      - name: Send release embed to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          REPO_NAME: ${{ github.event.repository.name }}
          RELEASE_PUBLISHED_AT: ${{ github.event.release.published_at }}
        run: |
          SAFE_CHANGELOG=$(printf "%s" "$RELEASE_BODY" | tr '\n' ' ' | sed 's/"/\\"/g' | cut -c1-900)

          if [ -z "$SAFE_CHANGELOG" ]; then
            SAFE_CHANGELOG="No changelog provided."
          fi

          cat > payload.json <<EOF
          {
            "username": "Xy Updates",
            "avatar_url": "https://i.imgur.com/oMMV6cO.png",
            "embeds": [
              {
                "title": "${RELEASE_NAME}",
                "url": "${RELEASE_URL}",
                "description": "A new plugin update has been released for **${REPO_NAME}**.",
                "color": 16753920,
                "thumbnail": {
                  "url": "https://i.imgur.com/oMMV6cO.png"
                },
                "fields": [
                  {
                    "name": "Plugin",
                    "value": "**${REPO_NAME}**",
                    "inline": true
                  },
                  {
                    "name": "Version",
                    "value": "**${RELEASE_TAG}**",
                    "inline": true
                  },
                  {
                    "name": "Changelog",
                    "value": "${SAFE_CHANGELOG}",
                    "inline": false
                  }
                ],
                "footer": {
                  "text": "Xy Development • Minecraft Plugin Updates"
                },
                "timestamp": "${RELEASE_PUBLISHED_AT}"
              }
            ]
          }
          EOF

          echo "Payload preview:"
          cat payload.json

          HTTP_CODE=$(curl --fail-with-body -sS -o response.txt -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -X POST \
            -d @payload.json \
            "$DISCORD_WEBHOOK_URL")

          echo "HTTP status: $HTTP_CODE"
          echo "Discord response:"
          cat response.txt