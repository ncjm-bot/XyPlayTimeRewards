name: Discord Release Announcement

on:
  release:
    types: [published]

jobs:
  announce:
    runs-on: ubuntu-latest

    steps:
      - name: Send release embed to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          REPO_NAME: ${{ github.event.repository.name }}
          RELEASE_PUBLISHED_AT: ${{ github.event.release.published_at }}
        run: |
          python <<'PY'
          import json
          import os

          release_name = os.environ.get("RELEASE_NAME", "").strip()
          release_tag = os.environ.get("RELEASE_TAG", "").strip()
          release_body = os.environ.get("RELEASE_BODY", "").strip()
          release_url = os.environ.get("RELEASE_URL", "").strip()
          repo_name = os.environ.get("REPO_NAME", "").strip()
          published_at = os.environ.get("RELEASE_PUBLISHED_AT", "").strip()

          if not release_body:
              release_body = "No changelog provided."

          safe_changelog = release_body[:1000]

          payload = {
              "username": "Xy Updates",
              "avatar_url": "https://i.imgur.com/oMMV6cO.png",
              "embeds": [
                  {
                      "title": release_name,
                      "url": release_url,
                      "description": f"A new plugin update has been released for **{repo_name}**.",
                      "color": 16753920,
                      "thumbnail": {
                          "url": "https://i.imgur.com/oMMV6cO.png"
                      },
                      "fields": [
                          {
                              "name": "Plugin",
                              "value": f"**{repo_name}**",
                              "inline": True
                          },
                          {
                              "name": "Version",
                              "value": f"**{release_tag}**",
                              "inline": True
                          },
                          {
                              "name": "Download",
                              "value": f"https://github.com/{repo_name}/releases/tag/{release_tag}",
                              "inline": False
                          },
                          {
                              "name": "Changelog",
                              "value": safe_changelog,
                              "inline": False
                          }
                      ],
                      "footer": {
                          "text": "Xy Development • Minecraft Plugin Updates"
                      },
                      "timestamp": published_at
                  }
              ]
          }

          with open("payload.json", "w", encoding="utf-8") as f:
              json.dump(payload, f, ensure_ascii=False)

          print("Payload preview:")
          print(json.dumps(payload, indent=2, ensure_ascii=False))
          PY

          echo "Sending webhook to Discord..."
          HTTP_CODE=$(curl --fail-with-body -sS -o response.txt -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -H "User-Agent: GitHubActions-DiscordWebhook/1.0" \
            -X POST \
            -d @payload.json \
            "$DISCORD_WEBHOOK_URL")

          echo "HTTP status: $HTTP_CODE"
          echo "Response body:"
          cat response.txt || true